# paraclin configuration — copy to config.yaml and edit for your setup:
#   cp config.example.yaml config.yaml
# config.yaml is git-ignored so your local paths are never committed.
# Paths may be absolute or relative to the repository root.

# Directory scanned (recursively) for Paraphase outputs
# (*.paraphase.json + sibling BAM/VCFs). Drop your Paraphase results here, or
# point this at an existing results directory.
results_root: sample_data

# Default reference build assumed when a sample does not encode one.
# Paraphase encodes the build in the JSON `phase_region` prefix (38 / 19 / chm13).
default_build: "38"

# SQLite index (created on first scan) and append-only audit log.
database: paraclin.db
audit_log: audit.log

# igv.js reference genome id (must match the build of the data).
igv_genome: hg38
reference_fasta: null

# Quality-control depth thresholds (read-depth gate only). A result is flagged
# for REVIEW if a depth is below its threshold or is not reported. These are
# conservative defaults — set validated values for your ONT assay.
min_region_depth: 20   # region median depth (x)
min_genome_depth: 15   # genome-wide depth (x)
